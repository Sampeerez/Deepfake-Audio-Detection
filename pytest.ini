[pytest]
# Test discovery is rooted at tests/; -ra prints a short summary of skips/xfails
# so optional-dependency skips (e.g. transformers) are always visible in the log.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
