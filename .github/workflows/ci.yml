name: CI

# Run the full test suite on every push and pull request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg (audio decode fallback)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install the CPU build of PyTorch
        # The default torch wheel ships CUDA (~2 GB). Installing the CPU wheel
        # FIRST satisfies the `torch>=2.0` constraint in requirements.txt, so the
        # next step does not pull the heavy GPU build on the CI runner.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run the test suite
        run: pytest -v
